<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_signup.css') }}">
    <title>Login & Sign Up - XIAOICE</title>
</head>

<body>

    <div class="container" id="container">
        
        <!-- Tabbed Header -->
        <div class="tabs">
            <button class="tab-btn active" id="tab-login">Sign In</button>
            <button class="tab-btn" id="tab-signup">Sign Up</button>
        </div>

        <!-- View Containers -->
        <div class="views-wrapper">
            
            <!-- LOGIN VIEW -->
            <div class="view-container active" id="login-view">
                <form id="signin-form" autocomplete="on">
                    <h1>Welcome Back</h1>
                    <p class="subtitle">Please enter your details to sign in.</p>
                    
                    <button type="button" class="google-btn" id="google-signin-btn">
                        <span class="google-icon-wrapper">
                            <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                        </span>
                        <span>Sign in with Google</span>
                    </button>
                    
                    <div class="divider"><span>or</span></div>
                    
                    <input type="email" id="signin-email" name="email" placeholder="Email" autocomplete="username" required>
                    <div class="password-field">
                        <input type="password" id="signin-password" name="password" placeholder="Password" autocomplete="current-password" required>
                        <button type="button" class="toggle-password" data-target="signin-password" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    
                    <div class="form-options">
                        <div class="remember-me-container">
                            <input type="checkbox" id="remember-me" name="remember-me">
                            <label for="remember-me">Remember Me</label>
                        </div>
                        <a href="/forgot_password" class="forgot-link">Forget Your Password?</a>
                    </div>
                    
                    <div id="signin-error" class="error-msg"></div>
                    <button type="submit" class="submit-btn">Sign In</button>
                </form>
            </div>

            <!-- SIGN UP VIEW -->
            <div class="view-container" id="signup-view" style="display: none;">
                <form id="signup-form" autocomplete="off" novalidate>
                    <!-- Hidden dummy fields to prevent browser save password prompts -->
                    <input type="text" name="fake-username" id="fake-username" autocomplete="username" style="position: absolute; left: -9999px; top: -9999px;" aria-hidden="true">
                    <input type="password" name="fake-password" id="fake-password" autocomplete="new-password" style="position: absolute; left: -9999px; top: -9999px;" aria-hidden="true">

                    <h1>Create Account</h1>
                    <p class="subtitle">Join us to access all site features.</p>
                    
                    <button type="button" class="google-btn" id="google-signup-btn">
                        <span class="google-icon-wrapper">
                            <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                        </span>
                        <span>Sign up with Google</span>
                    </button>
                    
                    <div class="divider"><span>or</span></div>
                    
                    <input type="text" id="signup-username" name="username" placeholder="Username" autocomplete="username" required>
                    <input type="email" id="signup-email" name="email" placeholder="Email" autocomplete="email" required>
                    
                    <div class="password-field">
                        <input type="password" id="signup-password" name="password" placeholder="Password" autocomplete="new-password" required>
                        <button type="button" class="toggle-password" data-target="signup-password" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-field">
                        <input type="password" id="signup-confirm-password" name="confirm-password" placeholder="Confirm Password" autocomplete="new-password" required>
                        <button type="button" class="toggle-password" data-target="signup-confirm-password" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    
                    <div id="signup-error" class="error-msg"></div>
                    <button type="submit" class="submit-btn" style="margin-top: 15px;">Sign Up</button>
                </form>
            </div>

        </div>
    </div>

    <!-- Firebase SDK (compat mode for broad browser support) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="{{ url_for('static', filename='js/login_signup.js') }}"></script>
</body>

</html>
