<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_signup.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forget_password.css') }}">
    <title>Forgot Password - Steup Growth</title>
</head>

<body>

    <div class="container" id="container">
        
        <div class="views-wrapper">
            <div class="view-container active" id="forget-password-view">
                <form id="forget-password-form">
                    <h1>Reset Password</h1>
                    <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>

                    <!-- Email input step -->
                    <div id="step-verify" class="form-step active">
                        <input type="email" id="reset-email" name="email" placeholder="Email" required>
                        <div id="reset-error" class="error-msg" style="display: none;"></div>
                        <button type="submit" id="verify-btn" class="submit-btn" style="margin-top: 10px;">Send Reset Link</button>
                    </div>

                    <!-- Success message -->
                    <div id="step-success" class="form-step text-center" style="display: none;">
                        <div class="success-icon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div id="reset-success" class="success-msg"></div>
                        <button type="button" id="resend-reset-btn" class="submit-btn resend-btn" style="display: none; margin-top: 15px;">
                            <i class="fas fa-redo"></i> Resend Email
                        </button>
                    </div>

                    <a href="{{ url_for('main.login_page') }}" class="back-link" id="back-link">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase SDK no longer needed — reset/verification handled by backend -->
    <script src="{{ url_for('static', filename='js/forget_password.js') }}"></script>
</body>

</html>
